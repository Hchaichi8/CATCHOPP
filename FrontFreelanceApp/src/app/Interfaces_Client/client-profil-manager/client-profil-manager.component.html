<div class="layout-container">

  <main class="main-content">
    
    <header class="top-header">
      <div class="welcome-text">
        <h1>Company Profile</h1>
        <p>Manage your brand identity and company details visible to freelancers.</p>
      </div>
      <div class="header-actions">
        <button class="btn-outline" routerLink="/ClientProfil">View Public Page</button>
        <button class="btn-create">Save Changes</button>
      </div>
    </header>

    <div class="edit-grid">
      
      <div class="column-main">
        
        <div class="card edit-card">
            <div class="card-header">
                <h3><i class="fa fa-building"></i> Company Information</h3>
                <p>General details about your organization.</p>
            </div>
            
            <div class="form-group">
                <label>Company Name</label>
                <input type="text" value="Acme Corp">
            </div>

            <div class="form-group">
                <label>Tagline / Headline</label>
                <input type="text" value="Building the future of digital payments.">
            </div>

            <div class="form-group">
                <label>About Us</label>
                <textarea rows="5" placeholder="Describe your company culture, mission, and what you do...">Acme Corp is a leading fintech startup focused on democratizing access to financial tools for small businesses. Founded in 2021, we have grown to a team of 50+ remote-first employees.</textarea>
            </div>
        </div>

        <div class="card edit-card">
            <div class="card-header">
                <h3><i class="fa fa-image"></i> Brand Assets</h3>
                <p>Update your logo and cover image.</p>
            </div>

            <div class="assets-row">
                <div class="asset-col">
                    <label>Company Logo</label>
                    <div class="logo-upload-box">
                        <img src="https://placehold.co/80x80/198754/ffffff?text=AC" alt="Logo">
                        <button class="btn-icon-edit"><i class="fa fa-camera"></i></button>
                    </div>
                </div>

                <div class="asset-col flex-grow">
                    <label>Profile Cover</label>
                    <div class="cover-upload-box">
                        <img src="https://images.unsplash.com/photo-1497366216548-37526070297c?auto=format&fit=crop&w=600&q=80" alt="Cover">
                        <div class="overlay">
                            <button class="btn-outline-white"><i class="fa fa-upload"></i> Change Cover</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

      </div>

      <aside class="column-side">
        
        <div class="card edit-card">
            <div class="card-header">
                <h3>Details</h3>
            </div>
            
            <div class="form-group">
                <label>Website</label>
                <input type="text" value="https://acmecorp.com">
            </div>

            <div class="form-group">
                <label>Industry</label>
                <select class="form-control">
                    <option selected>Fintech & SaaS</option>
                    <option>E-commerce</option>
                    <option>Healthcare</option>
                </select>
            </div>

            <div class="form-group">
                <label>Company Size</label>
                <select class="form-control">
                    <option>1-10 Employees</option>
                    <option selected>11-50 Employees</option>
                    <option>50-200 Employees</option>
                </select>
            </div>

            <div class="form-group">
                <label>Founded Year</label>
                <input type="number" value="2021">
            </div>
        </div>

        <div class="card edit-card">
            <div class="card-header">
                <h3>Location</h3>
            </div>
            <div class="form-group">
                <label>City</label>
                <input type="text" value="San Francisco">
            </div>
            <div class="form-group">
                <label>Country</label>
                <select class="form-control">
                    <option selected>United States</option>
                    <option>United Kingdom</option>
                    <option>Canada</option>
                </select>
            </div>
        </div>

        <div class="card edit-card">
            <div class="card-header">
                <h3>Social Links</h3>
            </div>
            <div class="social-input">
                <i class="fab fa-linkedin"></i>
                <input type="text" placeholder="LinkedIn URL">
            </div>
            <div class="social-input">
                <i class="fab fa-twitter"></i>
                <input type="text" placeholder="Twitter URL">
            </div>
        </div>

      </aside>

    </div>

  </main>
</div>
