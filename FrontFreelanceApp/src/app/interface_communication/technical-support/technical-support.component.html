<div class="support-window" *ngIf="isSupportOpen">
  
  <div class="support-header">
    <div class="header-info">
      <h4>Technical Support</h4>
      <div class="status-indicator">
        <span class="dot"></span> Online
      </div>
    </div>
    <button class="close-btn" (click)="toggleSupport()">&times;</button>
  </div>

  <div class="support-body">
    <div class="message bot">
      <div class="msg-bubble">
        Hello! 👋 How can we help you with your project today?
      </div>
      <span class="msg-time">Just now</span>
    </div>
  </div>

  <div class="support-footer">
    <input type="text" placeholder="Type your question...">
    <button class="send-btn">
      <i class="fa fa-paper-plane"></i>
    </button>
  </div>

</div>

<button class="fab-btn" (click)="toggleSupport()" [class.active]="isSupportOpen">
  <i class="fa fa-question" *ngIf="!isSupportOpen"></i>
  <i class="fa fa-chevron-down" *ngIf="isSupportOpen"></i>
</button>
