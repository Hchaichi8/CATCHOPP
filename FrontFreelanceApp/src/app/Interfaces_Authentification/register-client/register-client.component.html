<div class="auth-container">
  <div class="split-box">
    <div class="form-section">
      <div class="inner-form">
        <a routerLink="/LoginClient" class="back-link"><i class="fa fa-arrow-left"></i> Back to selection</a>
        
        <div class="header-area">
          <span class="badge client-badge">Join as Client</span>
          <h1>Hire the Best Talent.</h1>
          <p>Create a company account to start posting jobs.</p>
        </div>

        <div *ngIf="errorMessage" style="color: #ef4444; background: #fee2e2; padding: 10px; border-radius: 5px; margin-bottom: 15px; font-size: 0.9rem;">
          <i class="fa fa-exclamation-circle"></i> {{ errorMessage }}
        </div>

        <div *ngIf="successMessage" style="color: #166534; background: #dcfce7; padding: 10px; border-radius: 5px; margin-bottom: 15px; font-size: 0.9rem;">
          <i class="fa fa-check-circle"></i> {{ successMessage }}
        </div>

        <form (ngSubmit)="onRegister()">
          <div class="input-field">
            <label>Company / Full Name</label>
            <input type="text" placeholder="e.g. Acme Corp" name="companyName" [(ngModel)]="companyName" required>
          </div>

          <div class="input-field">
            <label>Work Email</label>
            <input type="email" placeholder="manager@acme.com" name="email" [(ngModel)]="email" required>
          </div>
          
          <div class="input-field">
            <label>Password</label>
            <input type="password" placeholder="Secure password" name="password" [(ngModel)]="password" required>
          </div>

          <div class="terms">
            <label>
              <input type="checkbox" name="agreeTerms" [(ngModel)]="agreeTerms"> 
              I agree to the <span>CatchIQ Hiring Terms</span>.
            </label>
          </div>

          <button type="submit" class="btn-auth client-btn">Get Started for Free</button>
        </form>

        <p class="switch-text">Hiring for a company? <a routerLink="/LoginClient">Log In</a></p>
      </div>
    </div>

    <div class="visual-section register-client-bg">
      <div class="visual-overlay">
        <h2>Build your dream team in minutes.</h2>
        <p>Access the world's most skilled freelancers under one roof.</p>
      </div>
    </div>
  </div>
</div>
